<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generador de contraseña</title>
<style>
  body { font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 0 20px; }
  input { width: 100%; padding: 10px; font-size: 16px; margin: 10px 0; box-sizing: border-box; }
  button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
  #resultado { margin-top: 20px; padding: 15px; background: #f0f0f0; word-break: break-all; font-family: monospace; }
  p.aviso { color: #555; font-size: 14px; }
</style>
</head>
<body>
  <h2>Generador de código para la contraseña</h2>
  <p class="aviso">Escribí la contraseña que querés usar para el panel admin. Esto NO se manda a ningún lado, se calcula acá mismo en tu navegador.</p>
  <input type="text" id="pass" placeholder="Tu contraseña">
  <button onclick="generar()">Generar código</button>
  <div id="resultado" style="display:none;"></div>

  <script>
    async function generar() {
      const texto = document.getElementById('pass').value;
      if (!texto) return;
      const data = new TextEncoder().encode(texto);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      const div = document.getElementById('resultado');
      div.style.display = 'block';
      div.innerHTML = '<strong>Copiá este código completo:</strong><br><br>' + hashHex;
    }
  </script>
</body>
</html>
